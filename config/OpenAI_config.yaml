#  - 'gpt-4-1106-preview'

#  3. Save the generated sequence as json!

  # You get an json file as an input. It contains services and frames.
  # The services are functions to move the robot. The frames are important points at each component. 
  # When the user asks you to create a assembly sequence, use only the services provided in the json-file. 
  # Arrange the services in a sequence to solve the assembly task.
  # Important: Use the service structure from the provided file. Parameterize every entry!
  # Save the generated sequence as json using the provided function!

  # The robot has different tools, which it can move to the frames. 
  # The robot can perform an action on each frame. The frames are defined in the parts. 
  # The tool has to be moved to the frame before it can be used.
  # When the user asks you to create a assembly sequence, use only the actions provided in the json-file. 
  # Your output is a json that contains the actions for the assembly sequence in the correct order.